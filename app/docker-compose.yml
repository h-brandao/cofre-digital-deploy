version: '3.8'  
services:  
  app:  
    build:  
      context: .  
      dockerfile: docker/Dockerfile 
    ports:  
      - "5000:5000" 
    environment:  
      - ENVIRONMENT=development 
      - APP_VERSION=1.0.0  
      - DB_HOST=localhost  
      - DB_USER=dev_user  
      - DB_PASSWORD=dev_password_123 
      - EXTERNAL_API_KEY=dev_key_abcd1234efgh5678  
      - PORT=5000  
    volumes: 
      - ./app:/app
